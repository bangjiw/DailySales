<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Sales Kuy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.copyright{
    font-size:13px;
    color:#777;
    text-align:center;
    margin:12px 0;
}

.card{
    width:90%;
    max-width:420px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    font-size:22px;
    margin-top:15px;
    border:2px solid #ddd;
    border-radius:10px;
    text-align:right;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#mulai{
    background:#28a745;
    color:white;
}

#next{
    background:#28a745;
    color:white;
}

#back{
    background:#495057;
    color:white;
}
.nav-btn{
    display:flex;
    gap:12px;
    margin-top:15px;
}

.nav-btn button{
    flex:1;
    margin-top:0;
}

pre{
    font-family:Consolas,"Courier New",monospace;
    white-space:pre;
    font-size:16px;
    line-height:1.7;
}
#progress{
    text-align:center;
    color:#888;
    font-size:14px;
    margin-bottom:8px;
}
</style>
</head>

<body>
<div class="copyright">
    © 2026 Daily Sales BBT Ciwidey • BangJiwCorp
</div>
<div class="card">

<div id="awal">
<h2>Anggeuskeun Hela daily sales bareng Aing</h2>
<button id="mulai">Gaskeun</button>
</div>

<div id="form" style="display:none;">
<div id="progress"></div>
<h2 id="judul"></h2>

<input
id="nominal"
type="tel"
inputmode="numeric"
autocomplete="off"
placeholder="0">

<div class="nav-btn">
    <button id="back">Saacana</button>
    <button id="next">Next</button>
</div>

</div>

<div id="hasil" style="display:none;">
<h2>=====  Hasilna  =====</h2>

<pre id="output"></pre>

<button id="copyData">Salin Data</button>
<button id="copyTotal">Salin Total Penjualan</button>
<button id="copyPendapatan">Salin Total Pendapatan</button>

</div>

</div>
<div class="copyright">
    © 2026 Daily Sales BBT Ciwidey • All Rights Reserved
</div>
<script>

const data=[
"Cash",
"GoFood",
"GrabFood",
"Shopeefood",
"Qris",
"Tiktok",
"Qpon",
"Pendapatan"
];

let nilai={};
let index=0;

const awal=document.getElementById("awal");
const form=document.getElementById("form");
const hasil=document.getElementById("hasil");

const judul=document.getElementById("judul");
const input=document.getElementById("nominal");
const progress = document.getElementById("progress");

function format(x){
    x=x.replace(/\D/g,"");
    if(x=="") return "";
    return Number(x).toLocaleString("id-ID");
}

function tampil(){
    progress.textContent = (index + 1) + " / " + data.length;

    judul.textContent = data[index];
    input.value = nilai[data[index]] || "";
    input.focus();
}

input.addEventListener("input",function(){
    this.value=format(this.value);
});

document.getElementById("mulai").onclick=function(){
    awal.style.display="none";
    form.style.display="block";
    tampil();
}

document.getElementById("next").onclick=function(){

    let angka=input.value.replace(/\./g,"");

    if(angka=="")
        angka="0";

    nilai[data[index]]=format(angka);

    if(index<data.length-1){

        index++;
        tampil();

    }else{

        form.style.display="none";
        hasil.style.display="block";

        let teks="";
let total=0;
let pendapatan=0;

window.dataCopy = "";
window.totalCopy = "";
window.totalPendapatanCopy = "";
let teksLayout = "";
data.forEach(x=>{
    let isi=nilai[x] || "0";
    // Untuk tampilan
let namaLayout = x.padEnd(12, " ");
teksLayout += namaLayout + " : Rp." + isi + ",-\n";

    let angka = Number(isi.replace(/\./g,""));

if(x=="Pendapatan"){
    pendapatan = angka;
}else{
    total += angka;
}

    let nama = "";

switch(x){
    case "Cash":
        nama = "Cash                : ";
        break;
    case "GoFood":
        nama = "GoFood           : ";
        break;
    case "GrabFood":
        nama = "GrabFood       : ";
        break;
    case "Shopeefood":
        nama = "Shopeefood   : ";
        break;
    case "Qris":
        nama = "Qris                  : ";
        break;
    case "Tiktok":
        nama = "Tiktok               : ";
        break;
    case "Qpon":
        nama = "Qpon                : ";
        break;
    case "Pendapatan":
nama = "Pendapatan   : ";
break;
}

let baris = nama + "Rp." + isi + ",-\n";

    teks += baris;

if(x != "Pendapatan"){
    window.dataCopy += baris;
}
});
let totalPendapatan = total + pendapatan;
teksLayout += "\n=============================\n";
teksLayout += "TOTAL PENJUALAN : Rp."+total.toLocaleString("id-ID")+",-\n\n";
teksLayout += "Pendapatan      : Rp."+pendapatan.toLocaleString("id-ID")+",-\n";
teksLayout += "=============================\n";
teksLayout += "TOTAL PENDAPATAN : Rp."+totalPendapatan.toLocaleString("id-ID")+",-";



teks += "\n=============================\n";
teks += "TOTAL PENJUALAN : Rp."+total.toLocaleString("id-ID")+",-\n\n";
teks += "Pendapatan      : Rp."+pendapatan.toLocaleString("id-ID")+",-\n";
teks += "=============================\n";
teks += "TOTAL PENDAPATAN : Rp."+totalPendapatan.toLocaleString("id-ID")+",-";

window.totalCopy = total.toLocaleString("id-ID");
window.totalPendapatanCopy = totalPendapatan.toLocaleString("id-ID");


if(!confirm("Pastikan data Ngges bener.\n\n" + teks)){
    form.style.display = "block";
    hasil.style.display = "none";
    tampil();
    return;
}

document.getElementById("output").textContent = teksLayout;



    }

}
document.getElementById("copyPendapatan").onclick = function(){

    navigator.clipboard.writeText(window.totalPendapatanCopy);

    alert("Total pendapatan berhasil disalin");

}
document.getElementById("copyData").onclick=function(){

    navigator.clipboard.writeText(window.dataCopy);

    alert("Data berhasil disalin");

}

document.getElementById("copyTotal").onclick=function(){

    navigator.clipboard.writeText(window.totalCopy);

    alert("Total berhasil disalin");

}
document.getElementById("back").onclick=function(){

    let angka=input.value.replace(/\./g,"");

    if(angka=="")
        angka="0";

    nilai[data[index]]=format(angka);

    if(index>0){

        index--;
        tampil();

    }

}

</script>

</body>
</html>
